<!DOCTYPE html>
<html>
<head>
    <title>Neues Gürtelmodell</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 500px; }
        label { display: block; margin-top: 10px; }
        input, textarea, select { width: 100%; padding: 8px; margin-top: 5px; }
        .button { padding: 8px 12px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Neues Gürtelmodell hinzufügen</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="button">Speichern</button>
    </form>
    <a href="{% url 'belt_list' %}" class="button">Zurück zur Liste</a>
</body>
</html>
