<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}BeltTracker{% endblock %}</title>
    {% load static %}  <!-- Static-Tag laden -->
    <link rel="stylesheet" href="{% static 'BeltTracker/css/styles.css' %}">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>BeltTracker</h2>
            <nav>
                <ul>
                    <li><a href="{% url 'belt_list' %}" class="{% if request.resolver_match.url_name == 'belt_list' %}active{% endif %}">Gürtelmodelle</a></li>
                    <li><a href="{% url 'wearing_time_list' %}" class="{% if request.resolver_match.url_name == 'wearing_time_list' %}active{% endif %}">Tragezeiten</a></li>
                </ul>
            </nav>
        </div>

        <!-- Hauptinhalt -->
        <div class="main-content">
            {% block content %}{% endblock %}
        </div>

        <!-- Belt Bar (unten) -->
        <div class="belt-bar">
            <div class="belt-info">
                {% if currently_worn_belt %}
                    <h3>Aktuell getragen:</h3>
                    <p>
                        <strong>{{ currently_worn_belt.name }}</strong>
                        (seit {{ currently_worn_start_time|date:'Y-m-d H:i' }})
                        <span id="beltBarWearingTime" class="realtime-duration"
                              data-start-time="{{ currently_worn_start_time|date:'Y-m-d\TH:i' }}"></span>
                    </p>
                {% else %}
                    <p>Kein Gürtel wird aktuell getragen.</p>
                {% endif %}
            </div>
        </div>
    </div>

    <!-- JavaScript für Echtzeit-Timer in der Belt Bar -->
    <script>
        // Echtzeit-Timer für die Belt Bar
        const beltBarWearingTimeElement = document.getElementById('beltBarWearingTime');
        if (beltBarWearingTimeElement) {
            const startTimeStr = beltBarWearingTimeElement.dataset.startTime;
            const startTime = new Date(startTimeStr + (startTimeStr.includes('+') ? '' : '+02:00'));

            function updateBeltBarWearingTime() {
                const now = new Date();
                const diff = now - startTime;

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                const durationStr = ` | Tragezeit: ${days} Tage, ${hours} Std., ${minutes} Min., ${seconds} Sek.`;
                beltBarWearingTimeElement.textContent = durationStr;
            }

            setInterval(updateBeltBarWearingTime, 1000);
            updateBeltBarWearingTime();
        }
    </script>
</body>
</html>
